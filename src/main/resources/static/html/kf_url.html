<style>
	:root {
		--primary: #3b82f6;
		--primary-hover: #2563eb;
		--border-color: #e5e7eb;
		--bg-light: #f9fafb;
		--text-dark: #111827;
		--text-gray: #6b7280;
	}
	#password-body {
		max-width: 860px;
		margin: 30px auto;
		background: white;
		padding: 24px;
		border-radius: 16px;
		box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
	}

	.flex-header {
		display: flex;
		justify-content: space-between;
		align-items: center;
		flex-wrap: wrap;
		gap: 12px;
	}

	select {
		padding: 8px 12px;
		border: 1px solid var(--border-color);
		border-radius: 8px;
		background: var(--bg-light);
		font-size: 14px;
	}

	textarea {
		width: 100%;
		height: 350px;
		font-size: 14px;
		padding: 10px;
		border: 1px solid var(--border-color);
		border-radius: 8px;
		background: var(--bg-light);
		margin-top: 12px;
		resize: vertical;
	}

	button {
		background: var(--primary);
		color: white;
		border: none;
		border-radius: 8px;
		padding: 10px 18px;
		cursor: pointer;
		font-size: 14px;
		transition: background 0.2s ease;
	}

	button:hover {
		background: var(--primary-hover);
	}
	#password-result{
		padding-top: 1.25rem;
	}
</style>
<div id="password-body">
	<div class="flex-header">
		<div>
			文件:
			<select id="app-type-name" data-change="myPwdChange(event)"></select>
		</div>
		<div>
			可用域名:
			<select id="use-domain" data-change="domainChange(event)"></select>
		</div>
	</div>
	<textarea id="pwd-txt" data-input="myPwdInput(event)" placeholder="请输入"></textarea>
	<br>
	<div class="opt-box"><button data-click="copyQueryPwd()">复制查询出的内容</button><button data-click="queryPwd()">执行</button></div>
	<div id="password-result"></div>
</div>
