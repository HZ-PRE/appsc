<style>
	:root {
		--primary: #3b82f6;
		--primary-hover: #2563eb;
		--border-color: #e5e7eb;
		--bg-light: #f9fafb;
		--text-dark: #111827;
		--text-gray: #6b7280;
	}
	#password-body {
		max-width: 860px;
		margin: 30px auto;
		background: white;
		padding: 24px;
		border-radius: 16px;
		box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
	}

	.flex-header {
		display: flex;
		justify-content: space-between;
		align-items: center;
		flex-wrap: wrap;
		gap: 12px;
	}

	select {
		padding: 8px 12px;
		border: 1px solid var(--border-color);
		border-radius: 8px;
		background: var(--bg-light);
		font-size: 14px;
	}

	textarea {
		width: 100%;
		height: 150px;
		font-size: 14px;
		padding: 10px;
		border: 1px solid var(--border-color);
		border-radius: 8px;
		background: var(--bg-light);
		margin-top: 12px;
		resize: vertical;
	}

	button {
		background: var(--primary);
		color: white;
		border: none;
		border-radius: 8px;
		padding: 10px 18px;
		cursor: pointer;
		font-size: 14px;
		transition: background 0.2s ease;
	}

	button:hover {
		background: var(--primary-hover);
	}
	#password-result{
		padding-top: 1.25rem;
	}
</style>

<div id="password-body">
	<div class="flex-header">
		<div>
			类型:
			<select data-change="myPwdChange(event)">
				<option value="0" data-extra-info="12">解密navicat12+</option>
				<option value="1" data-extra-info="12">加密navicat12+</option>
				<option value="0" data-extra-info="11">解密navicat11-</option>
				<option value="1" data-extra-info="11">加密navicat11-</option>
			</select>
		</div>
		<div>
			其它:
			<select data-change="myPwdChange(event)">
				<option value="2" data-extra-info="https://www.bt.cn/tools/encrybase.html">宝塔加密解密</option>
				<option value="2" data-extra-info="https://www.toolhelper.cn/SymmetricEncryption/AES">AES 加密/解密</option>
			</select>
		</div>
	</div>
	<textarea data-input="myPwdInput(event)" placeholder="请输入加密或解密信息"></textarea>
	<br>
	<div class="opt-box"><button data-click="copyQueryPwd()">复制查询出的内容</button><button data-click="queryPwd()">执行</button></div>
	<div id="password-result"></div>
</div>
