spring.application.name=appsc
spring.profiles.active=prod
app.version=2.8.2

# \u542F\u7528\u6587\u4EF6\u4E0A\u4F20
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=2000MB
spring.servlet.multipart.max-request-size=2000MB
spring.servlet.multipart.file-size-threshold=2MB

# ===== \u542F\u52A8\u901F\u5EA6\u4F18\u5316 =====
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
# \u5EF6\u8FDF\u521D\u59CB\u5316\uFF08Bean\u6309\u9700\u52A0\u8F7D\uFF09
spring.main.lazy-initialization=true
# \u5173\u95ED\u542F\u52A8\u6A2A\u5E45
spring.main.banner-mode=off
# \u5173\u95EDJMX
spring.jmx.enabled=false
# \u5173\u95ED\u542F\u52A8\u4FE1\u606F
spring.main.log-startup-info=false
# \u7981\u6B62\u672A\u4F7F\u7528\u7684\u81EA\u52A8\u914D\u7F6E
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.task.TaskExecutionAutoConfiguration,\
  org.springframework.boot.autoconfigure.task.TaskSchedulingAutoConfiguration,\
  org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,\
  org.springframework.boot.autoconfigure.jdbc.JdbcTemplateAutoConfiguration,\
  org.springframework.boot.autoconfigure.jdbc.DataSourceTransactionManagerAutoConfiguration,\
  org.springframework.boot.autoconfigure.transaction.TransactionAutoConfiguration,\
  org.springframework.boot.autoconfigure.websocket.servlet.WebSocketServletAutoConfiguration,\
  org.springframework.boot.autoconfigure.jms.JmsAutoConfiguration,\
  org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration,\
  org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration


# ===== Undertow\u4F18\u5316 =====
server.undertow.threads.io=1
server.undertow.threads.worker=2
server.undertow.buffer-size=512
server.undertow.direct-buffers=false
server.undertow.always-set-keep-alive=false

# ===== \u54CD\u5E94\u5185\u5BB9\u538B\u7F29 =====
server.compression.enabled=true
server.compression.min-response-size=512B
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json,application/xml

# ===== \u65E5\u5FD7\u4F18\u5316 =====
logging.level.root=warn
logging.level.com.sync.sc=info


